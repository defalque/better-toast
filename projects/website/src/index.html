<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Better Toast</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&display=swap"
      rel="stylesheet"
    />
    <script>
      // Applies the persisted theme before Angular hydrates to avoid a flash of the wrong theme.
      (function () {
        try {
          var pref = localStorage.getItem('theme') || 'system';
          var resolved =
            pref === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : pref;
          document.documentElement.classList.toggle('dark', resolved === 'dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-white dark:bg-neutral-950/98">
    <app-root></app-root>
  </body>
</html>
