<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Better Toast</title>
    <link id="app-favicon" rel="icon" href="/favicon-light.ico" type="image/x-icon" />
    <link id="app-apple-touch-icon" rel="apple-touch-icon" href="/apple-touch-icon-light.png" />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="index, follow" />
    <meta id="app-theme-color" name="theme-color" content="#ffffff" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Better Toast" />
    <meta
      property="og:description"
      content="Elegant toast notifications library for Angular v21+."
    />
    <meta id="app-og-image" property="og:image" content="/og-light.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Better Toast" />
    <meta
      name="twitter:description"
      content="Elegant toast notifications library for Angular v21+."
    />
    <meta id="app-twitter-image" name="twitter:image" content="/og-light.png" />

    <script>
      // Applies the persisted theme before Angular hydrates to avoid a flash of the wrong theme.
      (function () {
        try {
          var pref = localStorage.getItem('theme') || 'system';
          var resolved =
            pref === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : pref;
          document.documentElement.classList.toggle('dark', resolved === 'dark');
          document
            .getElementById('app-favicon')
            ?.setAttribute(
              'href',
              resolved === 'dark' ? '/favicon-dark.ico' : '/favicon-light.ico',
            );
          document
            .getElementById('app-apple-touch-icon')
            ?.setAttribute(
              'href',
              resolved === 'dark' ? '/apple-touch-icon-dark.png' : '/apple-touch-icon-light.png',
            );
          document
            .getElementById('app-theme-color')
            ?.setAttribute('content', resolved === 'dark' ? '#0a0a0a' : '#ffffff');
          var origin = window.location.origin || '';
          var ogShare =
            origin + (resolved === 'dark' ? '/og-dark.png' : '/og-light.png');
          document.getElementById('app-og-image')?.setAttribute('content', ogShare);
          document.getElementById('app-twitter-image')?.setAttribute('content', ogShare);
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-white dark:bg-neutral-950/95 antialiased">
    <app-root></app-root>
  </body>
</html>
