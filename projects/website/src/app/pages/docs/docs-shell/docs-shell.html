<div class="flex flex-col min-h-screen">
  <header class="block lg:hidden p-4 border-b border-dashed border-zinc-200 dark:border-zinc-800">
    <div class="mx-auto py-4 max-w-2xl">
      <div class="flex items-center-safe justify-between">
        <a href="/" class="text-2xl font-bold tracking-tight text-zinc-900 dark:text-zinc-100"
          >Better Toast</a
        >

        <button
          class="text-sm text-zinc-600 dark:text-zinc-500 hover:text-zinc-800 dark:hover:text-zinc-200 cursor-pointer"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="-rotate-90"
          >
            <path d="M5 21v-6" />
            <path d="M12 21V3" />
            <path d="M19 21V9" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <aside
    class="w-64 border-r border-dashed border-zinc-200 dark:border-zinc-800 hidden lg:block fixed left-0 top-0 bottom-0 bg-gray-100/60 dark:bg-zinc-950/50 divide-y divide-zinc-200 dark:divide-zinc-800 divide-dashed"
  >
    <div class="px-3 py-4 space-x-2">
      <a href="/" class="text-2xl font-semibold tracking-tight text-zinc-900 dark:text-zinc-100"
        >Better Toast</a
      >
      <span class="text-[11px] text-zinc-600 dark:text-zinc-500 self-end font-medium"
        >by
        <a
          href="https://marcodefalco.dev"
          target="_blank"
          rel="noopener noreferrer"
          class="text-orange-500 dark:text-orange-400"
          >Marco De Falco</a
        ></span
      >
    </div>
    <ul
      class="flex flex-col gap-6 px-3 font-medium divide-y divide-zinc-200 dark:divide-zinc-800 divide-dashed"
    >
      <div class="py-6 space-y-1.5">
        <p class="px-2 text-xs text-zinc-400 dark:text-zinc-500">Basics</p>
        <li class="w-full">
          <a
            [routerLink]="['/docs/getting-started']"
            routerLinkActive="active"
            class="text-sm text-zinc-600/95 dark:text-zinc-300 hover:bg-zinc-200/50 dark:hover:bg-zinc-800/60 px-2 py-1 rounded-md block"
            >Getting Started</a
          >
        </li>
      </div>

      <div class="pb-6 space-y-1">
        <p class="px-2 text-xs text-zinc-400 dark:text-zinc-500">API</p>
        <li class="w-full">
          <a
            [routerLink]="['/docs/better-toaster']"
            routerLinkActive="active"
            class="text-sm text-zinc-600/95 dark:text-zinc-300 hover:bg-zinc-200/50 dark:hover:bg-zinc-800/60 px-2 py-1 rounded-md block"
            >Better Toaster</a
          >
        </li>
        <li class="w-full">
          <a
            [routerLink]="['/docs/toast-types']"
            routerLinkActive="active"
            class="text-sm text-zinc-600/95 dark:text-zinc-300 hover:bg-zinc-200/50 dark:hover:bg-zinc-800/60 px-2 py-1 rounded-md block"
            >Toast</a
          >
        </li>
        <li class="w-full">
          <a
            [routerLink]="['/docs/other']"
            routerLinkActive="active"
            class="text-sm text-zinc-600/95 dark:text-zinc-300 hover:bg-zinc-200/50 dark:hover:bg-zinc-800/60 px-2 py-1 rounded-md block"
            >Other</a
          >
        </li>
      </div>

      <div class="pb-6 space-y-1">
        <span class="px-2 text-xs text-zinc-400 dark:text-zinc-500">Guides</span>
        <li class="w-full">
          <a
            [routerLink]="['/docs/styling']"
            routerLinkActive="active"
            class="text-sm text-zinc-600/95 dark:text-zinc-300 hover:bg-zinc-200/50 dark:hover:bg-zinc-800/60 px-2 py-1 rounded-md block"
            >Styling</a
          >
        </li>
      </div>
      <div class="absolute bottom-4 left-4">
        <app-theme-toggle />
      </div>
    </ul>
  </aside>

  <div class="flex-1 p-4 ml-0 lg:ml-64 _dark:bg-neutral-950/98 py-22">
    <router-outlet />
  </div>
</div>
