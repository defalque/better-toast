<div class="flex flex-col min-h-screen relative overflow-x-clip">
  <header
    class="block lg:hidden p-4 border-b border-dashed border-zinc-200 dark:border-zinc-800"
    [inert]="openDrawer()"
  >
    <div class="mx-auto py-2 max-w-2xl">
      <div class="flex items-center-safe justify-between">
        <a href="/" class="text-2xl font-bold tracking-tight text-zinc-900 dark:text-zinc-100"
          >Better Toast</a
        >

        <button
          class="text-zinc-400 -mr-2 p-2 dark:text-zinc-500 hover:text-zinc-800 dark:hover:text-zinc-200 cursor-pointer"
          (click)="openDrawer.set(!openDrawer())"
          aria-label="Open sidebar"
        >
          <svg
            aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="-rotate-90"
          >
            <path d="M5 21v-6" />
            <path d="M12 21V3" />
            <path d="M19 21V9" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Desktop sidebar -->
  <aside
    class="w-64 border-r border-dashed border-zinc-200 dark:border-zinc-800 hidden lg:flex lg:flex-col fixed left-0 top-0 bottom-0 bg-gray-100/60 dark:bg-zinc-950/50 divide-y divide-zinc-200 dark:divide-zinc-800 divide-dashed"
  >
    <div class="shrink-0 px-3 py-4 space-x-2">
      <a href="/" class="text-2xl font-bold tracking-tight text-zinc-900 dark:text-zinc-100"
        >Better Toast</a
      >
      <span class="text-[10px] text-zinc-600 dark:text-zinc-500 self-end font-semibold"
        >by
        <a
          href="https://marcodefalco.dev"
          target="_blank"
          rel="noopener noreferrer"
          class="text-orange-500 dark:text-orange-400"
          >Marco De Falco</a
        ></span
      >
    </div>
    <nav
      class="flex min-h-0 flex-1 flex-col _gap-6 overflow-y-auto px-3 font-medium divide-y divide-zinc-200 dark:divide-zinc-800 divide-dashed"
    >
      <div class="py-6">
        <span class="px-2 text-xs text-zinc-500/70 dark:text-zinc-500">Basics</span>
        <ul class="space-y-1">
          <li class="w-full">
            <a
              [routerLink]="['/docs/getting-started']"
              routerLinkActive="active"
              class="text-sm text-zinc-600/95 dark:text-zinc-300 hover:bg-zinc-200/50 dark:hover:bg-zinc-800/60 px-2 py-1 rounded-md block"
              >Getting Started</a
            >
          </li>
        </ul>
      </div>

      <div class="py-6">
        <span class="px-2 text-xs text-zinc-500/70 dark:text-zinc-500">API</span>
        <ul class="space-y-1">
          <li class="w-full">
            <a
              [routerLink]="['/docs/better-toaster']"
              routerLinkActive="active"
              class="text-sm text-zinc-600/95 dark:text-zinc-300 hover:bg-zinc-200/50 dark:hover:bg-zinc-800/60 px-2 py-1 rounded-md block"
              >Better Toaster</a
            >
          </li>
          <li class="w-full">
            <a
              [routerLink]="['/docs/toast-types']"
              routerLinkActive="active"
              class="text-sm text-zinc-600/95 dark:text-zinc-300 hover:bg-zinc-200/50 dark:hover:bg-zinc-800/60 px-2 py-1 rounded-md block"
              >Toast</a
            >
          </li>
          <li class="w-full">
            <a
              [routerLink]="['/docs/other']"
              routerLinkActive="active"
              class="text-sm text-zinc-600/95 dark:text-zinc-300 hover:bg-zinc-200/50 dark:hover:bg-zinc-800/60 px-2 py-1 rounded-md block"
              >Other</a
            >
          </li>
        </ul>
      </div>

      <div class="py-6 flex-1">
        <span class="px-2 text-xs text-zinc-500/70 dark:text-zinc-500">Guides</span>
        <ul class="space-y-1">
          <li class="w-full">
            <a
              [routerLink]="['/docs/styling']"
              routerLinkActive="active"
              class="text-sm text-zinc-600/95 dark:text-zinc-300 hover:bg-zinc-200/50 dark:hover:bg-zinc-800/60 px-2 py-1 rounded-md block"
              >Styling</a
            >
          </li>
        </ul>
      </div>

      <div class="mt-auto py-6">
        <div class="flex items-center justify-between">
          <app-theme-toggle />
          <a
            href="https://github.com/defalque/better-toast"
            target="_blank"
            rel="noopener noreferrer"
            class="cursor-pointer"
            aria-label="Github repo"
          >
            <svg
              aria-hidden="true"
              viewBox="0 0 20 20"
              version="1.1"
              xmlns="http://www.w3.org/2000/svg"
              xmlns:xlink="http://www.w3.org/1999/xlink"

          </a>
        </div>
      </div>
    </nav>
  </aside>

            <li class="w-full">

                [routerLink]="['/docs/toast-types']"

            <li class="w-full">

                <g id="SVGRepo_iconCarrier">

  <div class="flex-1 p-4 ml-0 lg:ml-64 py-8 sm:py-12 lg:py-22" [inert]="openDrawer()">
    <router-outlet />
  </div>
