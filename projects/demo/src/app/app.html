<main
  class="grid place-items-center min-h-screen bg-white dark:bg-zinc-900 p-6 text-zinc-900 dark:text-zinc-100"
>
  <div class="w-full max-w-xl space-y-6">
    <header class="space-y-1 text-center">
      <h1 class="text-xl font-semibold tracking-tight">better-toast demo</h1>
      <p class="text-sm text-zinc-600 dark:text-zinc-400">
        Try each variant and move the stack with the position control.
      </p>
    </header>

    <div class="flex flex-wrap items-center justify-center gap-2">
      <label class="sr-only" for="toaster-position">Toast position</label>
      <select
        id="toaster-position"
        class="cursor-pointer border border-gray-300 dark:border-zinc-700 bg-white dark:bg-zinc-950 py-2 px-3 text-sm rounded-md"
        [value]="toasterPosition()"
        (change)="onPositionChange($event)"
      >
        @for (p of positions; track p) {
          <option [value]="p">{{ p }}</option>
        }
      </select>
      <button
        type="button"
        class="border border-zinc-300 dark:border-zinc-600 py-2 px-3 text-sm rounded-md hover:bg-zinc-100 dark:hover:bg-zinc-800"
        (click)="clearToasts()"
      >
        Clear all
      </button>
    </div>

    <div class="flex flex-wrap justify-center gap-2">
      <button
        type="button"
        class="bg-zinc-700 text-white py-2 px-3 text-sm rounded-md hover:bg-zinc-800"
        (click)="showDefaultToast()"
      >
        Default
      </button>
      <button
        type="button"
        class="bg-emerald-600 text-white py-2 px-3 text-sm rounded-md hover:bg-emerald-700"
        (click)="showSuccessToast()"
      >
        Success
      </button>
      <button
        type="button"
        class="bg-red-600 text-white py-2 px-3 text-sm rounded-md hover:bg-red-700"
        (click)="showErrorToast()"
      >
        Error
      </button>
      <button
        type="button"
        class="bg-sky-600 text-white py-2 px-3 text-sm rounded-md hover:bg-sky-700"
        (click)="showInfoToast()"
      >
        Info
      </button>
      <button
        type="button"
        class="bg-amber-500 text-zinc-900 py-2 px-3 text-sm rounded-md hover:bg-amber-600"
        (click)="showWarningToast()"
      >
        Warning
      </button>
      <button
        type="button"
        class="bg-violet-600 text-white py-2 px-3 text-sm rounded-md hover:bg-violet-700"
        (click)="showLoadingToast()"
      >
        Loading
      </button>
    </div>
  </div>
</main>

<router-outlet />

<app-toaster [position]="toasterPosition()" />
